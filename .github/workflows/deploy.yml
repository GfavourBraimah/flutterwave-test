name: Deploy Nuxt SSG to Hetzner

on:
  push:
    branches: [ main ]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/nuxt-frontend-test

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Needed to push private images to GHCR

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

       # THIS IS THE FIX: Convert the image name to completely lowercase
      - name: Set lowercase image name
        run: |
          echo "IMAGE_NAME=$(echo ghcr.io/${{ github.repository }}/nuxt-frontend-test | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV 
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Hetzner via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Log the server into GHCR using GitHub's temporary token
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 2. Pull the private image
            docker pull ${{ env.IMAGE_NAME }}:latest
            
            # 3. Stop the old container
            docker stop nuxt-frontend || true
            docker rm nuxt-frontend || true
            
            # 4. Run the new Node 14 http-server container on port 3000
            docker run -d \
              --name nuxt-frontend \
              --restart unless-stopped \
              -p 3000:3000 \
              ${{ env.IMAGE_NAME }}:latest
            
            # 5. Clean up old images
            docker image prune -af